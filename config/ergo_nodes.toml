# Ergo node configurations for Basis Tracker
# The tracker works uniformly with any Ergo node regardless of network.
# Network is determined by the node the user connects to.

[nodes]
niscoverednodes = [
    { url = "http://159.89.116.15:11088", description = "Public Ergo node" },
    { url = "http://213.239.193.208:9053", description = "Another public Ergo node" },
    { url = "http://localhost:9053", description = "Local Ergo node" },
]

# Default configuration
default_timeout = 30

# Reserve contract P2S address for Basis reserves
[reserve_contract_p2s]
basis_reserve = ""
